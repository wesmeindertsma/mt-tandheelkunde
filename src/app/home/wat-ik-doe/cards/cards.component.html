<div class="card-deck">
  <a *ngFor="let card of cards" [routerLink]="card.url" class="card">
    <img [src]="card.imageUrl" class="card-img-top" [alt]="card.titel">
    <div class="card-body">
      <h5 class="card-title">{{ card.titel }}</h5>
      <p class="card-text">{{ card.omschrijving | truncate: 10 }}</p>
      <span class="card-arrow">
        Meer lezen <i class="bi bi-arrow-right"></i>
      </span>
    </div>
  </a>
</div>
