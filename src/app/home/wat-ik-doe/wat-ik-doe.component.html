<section id="wat-ik-doe" class="wat-ik-doe section-bg">
  <div class="container">
    <div class="section-title">
      <span class="overline">Specialisaties</span>
      <h2>Wat ik doe</h2>
      <p>Ik ben gespecialiseerd in restauratieve en esthetische tandheelkunde. Bekijk de behandelingen die ik aanbied.</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4">
      <div class="col" *ngFor="let b of behandelingen">
        <div class="behandeling-card" (click)="openModal(b)" role="button" tabindex="0"
             (keydown.enter)="openModal(b)" (keydown.space)="openModal(b)">
          <div class="behandeling-card-img">
            <img [src]="b.foto" [alt]="b.titel">
          </div>
          <div class="behandeling-card-body">
            <h5>{{ b.titel }}</h5>
            <p>{{ b.beschrijving }}</p>
            <span class="meer-info-link">Meer informatie <i class="bi bi-arrow-right-short"></i></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal overlay -->
<div class="beh-modal-overlay" *ngIf="activeBehandeling" (click)="closeModal()">
  <div class="beh-modal" (click)="$event.stopPropagation()">
    <button class="beh-modal-close" (click)="closeModal()" aria-label="Sluiten">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="beh-modal-img">
      <img [src]="activeBehandeling.foto" [alt]="activeBehandeling.titel">
    </div>
    <div class="beh-modal-body">
      <h3>{{ activeBehandeling.titel }}</h3>
      <p class="beh-modal-intro">{{ activeBehandeling.beschrijving }}</p>
      <div class="beh-modal-detail" *ngIf="activeBehandeling.detailTekst">{{ activeBehandeling.detailTekst }}</div>
    </div>
  </div>
</div>
