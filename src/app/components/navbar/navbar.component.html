<header id="header" class="fixed-top d-flex align-items-center">
  <div class="container d-flex align-items-center">

    <div class="logo me-auto">
      <h1><a routerLink="/home">MT <span>Tandheelkunde</span></a></h1>
    </div>

    <!-- Desktop navigatie (ul verborgen op mobiel via CSS) -->
    <nav id="navbar" class="navbar order-last order-lg-0">
      <ul>
        <li><a class="nav-link" style="cursor:pointer" (click)="scrollTo('wie-ik-ben')">Wie ben ik</a></li>
        <li><a class="nav-link" style="cursor:pointer" (click)="scrollTo('wat-ik-doe')">Behandelingen</a></li>
        <li><a class="nav-link" style="cursor:pointer" (click)="scrollTo('portfolio')">Portfolio</a></li>
        <li><a class="nav-link" style="cursor:pointer" (click)="scrollTo('contact')">Contact</a></li>
        <li><a class="btn-afspraak" style="cursor:pointer" (click)="scrollTo('afspraak')">
          <i class="bi bi-calendar-check me-1"></i>Afspraak
        </a></li>
      </ul>
      <!-- Hamburger-icoon (alleen zichtbaar op mobiel) -->
      <i class="bi bi-list mobile-nav-toggle" (click)="toggleMenu()"></i>
    </nav>

    <div class="header-social-links d-flex align-items-center">
      <a href="tel:0596219219" title="Bel ons"><i class="bi bi-telephone"></i></a>
      <a href="mailto:info@mt-tandheelkunde.nl" title="E-mail"><i class="bi bi-envelope"></i></a>
    </div>

  </div>
</header>

<!--
  Mobiel menu-overlay — BUITEN <header> geplaatst.
  #header heeft backdrop-filter:blur(), wat position:fixed bij nakomelingen
  koppelt aan de header i.p.v. de viewport. Door de overlay hier te renderen
  werkt position:fixed correct t.o.v. het volledige scherm.
-->
<div class="navbar-mobile" *ngIf="menuOpen">
  <i class="bi bi-x mobile-nav-toggle" (click)="closeMenu()"></i>
  <ul>
    <li><a style="cursor:pointer" (click)="scrollTo('wie-ik-ben'); closeMenu()">Wie ben ik</a></li>
    <li><a style="cursor:pointer" (click)="scrollTo('wat-ik-doe'); closeMenu()">Behandelingen</a></li>
    <li><a style="cursor:pointer" (click)="scrollTo('portfolio'); closeMenu()">Portfolio</a></li>
    <li><a style="cursor:pointer" (click)="scrollTo('contact'); closeMenu()">Contact</a></li>
    <li><a class="btn-afspraak" style="cursor:pointer" (click)="scrollTo('afspraak'); closeMenu()">
      <i class="bi bi-calendar-check me-1"></i>Afspraak
    </a></li>
  </ul>
</div>
